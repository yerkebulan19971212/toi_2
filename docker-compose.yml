services:

  # ── PostgreSQL ──────────────────────────────────────────
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: shaqyru
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d shaqyru"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Django backend ──────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    command: >
      sh -c "python manage.py migrate --noinput &&
             python manage.py seed_data &&
             gunicorn NewToi.wsgi:application
               --bind 0.0.0.0:8081
               --workers 3
               --reload"
    volumes:
      - .:/app
      - media_data:/app/media
    ports:
      - "8081:8081"
    environment:
      DEBUG: "True"
      SECRET_KEY: "django-insecure-docker-dev-change-in-prod"
      ALLOWED_HOSTS: "localhost,127.0.0.1,backend"
      USE_POSTGRES: "True"
      DB_NAME: shaqyru
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_HOST: db
      DB_PORT: "5432"
      CORS_ALLOWED_ORIGINS: "http://localhost:3030,http://127.0.0.1:3030"
    depends_on:
      db:
        condition: service_healthy

  # ── Nuxt 4 frontend (dev mode with hot-reload) ──────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: dev
    restart: unless-stopped
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "3030:3030"
    environment:
      NUXT_PUBLIC_API_BASE: "http://localhost:8081"
    depends_on:
      - backend

volumes:
  postgres_data:
  media_data:
