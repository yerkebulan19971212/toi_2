services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    restart: always
    command: >
      sh -c "python manage.py migrate --noinput &&
             python manage.py collectstatic --noinput &&
             gunicorn NewToi.wsgi:application
               --bind 0.0.0.0:8081
               --workers 4
               --timeout 120"
    volumes:
      - media_data:/app/media
      - static_data:/app/staticfiles
    ports:
      - "8081:8081"
    environment:
      DEBUG: "False"
      SECRET_KEY: ${SECRET_KEY}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-localhost}
      USE_POSTGRES: "True"
      DB_NAME: ${DB_NAME:-shaqyru}
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_HOST: ${DB_HOST}
      DB_PORT: "5432"
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3030}

volumes:
  media_data:
  static_data:
